services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       taskboard
      POSTGRES_USER:     taskuser
      POSTGRES_PASSWORD: taskpass123
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    image: chalit06/taskboard-backend:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DB_HOST:     db
      DB_PORT:     5432
      DB_NAME:     taskboard
      DB_USER:     taskuser
      DB_PASSWORD: taskpass123
      PORT:        3001
    depends_on:
      - db

  frontend:
    image: chalit06/taskboard-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pg_data: